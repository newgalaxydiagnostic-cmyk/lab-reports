<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Pathology Lab</title>
<style>
body{font-family:Arial;margin:0;background:#0f172a;color:white}
header{background:#020617;padding:15px;text-align:center}
.container{padding:20px;text-align:center}
input,button{padding:10px;margin:10px;border-radius:5px;border:none}
button{background:#22c55e;color:white;cursor:pointer}
.admin{display:none}
.card{background:#1e293b;padding:20px;border-radius:10px;margin-top:20px}
</style>
</head>
<body><header>
<h1>Galaxy Pathology Lab</h1>
<p>Contact: 7007039552</p>
</header><div class="container"><h2>Download Your Report</h2>
<input type="text" id="patientId" placeholder="Enter Patient ID">
<button onclick="getReport()">Download Report</button><div id="result"></div><hr><h2>Admin Login</h2>
<input type="password" id="adminPass" placeholder="Enter Password">
<button onclick="loginAdmin()">Login</button><div class="admin" id="adminPanel">
<div class="card">
<h3>Add Patient Report</h3>
<input type="text" id="pname" placeholder="Patient Name"><br>
<input type="text" id="pid" placeholder="Patient ID"><br>
<input type="text" id="test" placeholder="Test Name"><br>
<input type="text" id="date" placeholder="Date"><br>
<input type="text" id="link" placeholder="Google Drive Link"><br>
<button onclick="saveData()">Save Report</button><h3>Generated Message</h3>
<textarea id="msg" rows="5" style="width:100%"></textarea>
</div>
</div></div><script>
let database = JSON.parse(localStorage.getItem('labData')) || {};

function saveData(){
let name = document.getElementById('pname').value;
let id = document.getElementById('pid').value;
let test = document.getElementById('test').value;
let date = document.getElementById('date').value;
let link = document.getElementById('link').value;

if(!id || !link){alert("ID and Link required"); return;}

database[id] = {name,test,date,link};
localStorage.setItem('labData', JSON.stringify(database));

let message = `Galaxy Pathology Lab\nPatient: ${name}\nTest: ${test}\nDate: ${date}\nPatient ID: ${id}\nDownload Report: ${link}`;

document.getElementById('msg').value = message;
alert("Saved Successfully");
}

function getReport(){
let id = document.getElementById('patientId').value;
let data = database[id];

if(data){
window.open(data.link, '_blank');
}else{
document.getElementById('result').innerHTML = "Report Not Found";
}
}

function loginAdmin(){
let pass = document.getElementById('adminPass').value;
if(pass === "azzu0822t"){
document.getElementById('adminPanel').style.display = 'block';
}else{
alert("Wrong Password");
}
}
</script></body>
</html>
