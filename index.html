<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaxy Pathology Lab</title>
<style>
:root{--bg:#020617;--card:#0f172a;--accent:#22c55e;--muted:#94a3b8}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial;background:#020617;color:#e5e7eb}header{padding:16px;text-align:center} h1{margin:0;font-size:22px} p.sub{margin:5px 0 0;color:var(--muted);font-size:13px}

.container{ min-height:calc(100vh - 90px); display:flex; align-items:center; justify-content:center; padding:10px }

.card{ width:100%; max-width:480px; background:var(--card); border-radius:20px; padding:25px; box-shadow:0 20px 50px rgba(0,0,0,.6) }

.input{width:100%;padding:15px;border-radius:12px;border:none;background:#020617;color:white;margin-top:14px;font-size:15px}

.btn{width:100%;padding:15px;border-radius:14px;border:none;background:var(--accent);color:#022c22;font-weight:700;margin-top:16px;font-size:15px}

.small{font-size:13px;color:var(--muted);margin-top:10px;text-align:center}

.footer-admin{position:fixed;bottom:10px;left:0;right:0;text-align:center} .admin-toggle{padding:6px 12px;border-radius:20px;background:#020617;border:1px solid #1f2937;color:#94a3b8;font-size:12px}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;padding:16px} .modal.open{display:flex}

textarea{width:100%;min-height:150px;border-radius:10px;background:#020617;color:white;padding:10px;margin-top:10px} </style>

</head>
<body><header>
<h1>🌟 Galaxy Pathology Lab</h1>
<p class="sub">Accurate Reports • Fast Service • Contact: 7007039552</p>
</header><div class="container">
  <div class="card">
    <h2 style="margin:0 0 10px;text-align:center">Download Your Report</h2>
    <input class="input" type="text" id="patientId" placeholder="Enter Patient ID">
    <button class="btn" onclick="getReport()">View / Download Report</button>
    <p id="result" class="small"></p>
  </div>
</div><div class="footer-admin">
  <span class="admin-toggle" onclick="openLogin()">Admin</span>
</div><div id="loginModal" class="modal">
  <div class="card">
    <h3>Admin Login</h3>
    <input class="input" type="password" id="adminPass" placeholder="Enter Password">
    <button class="btn" onclick="loginAdmin()">Login</button>
  </div>
</div><div id="adminModal" class="modal">
  <div class="card">
    <h3>Add Patient Report</h3>
    <input class="input" type="text" id="pname" placeholder="Patient Name">
    <input class="input" type="text" id="pidInput" placeholder="Enter Patient ID">
    <input class="input" type="text" id="test" placeholder="Test Name">
    <input class="input" type="text" id="date" placeholder="Date">
    <input class="input" type="text" id="link" placeholder="Google Drive Link">
    <button class="btn" onclick="saveData()">Save & Generate Message</button><textarea id="msg"></textarea>
<button class="btn" onclick="copyMsg()">Copy Message</button>

  </div>
</div><script>
const CONTACT = '7007039552';
const SITE = 'https://newgalaxydiagnostic-cmyk.github.io/lab-reports/';

let database = JSON.parse(localStorage.getItem('labData')) || {};

function openLogin(){document.getElementById('loginModal').classList.add('open')}

function loginAdmin(){
  let pass = document.getElementById('adminPass').value;
  if(pass==='azzu0822t'){
    document.getElementById('loginModal').classList.remove('open');
    document.getElementById('adminModal').classList.add('open');
  }else{alert('Wrong Password')}
}

function saveData(){
  let name=document.getElementById('pname').value;
  let id=document.getElementById('pidInput').value;
  let test=document.getElementById('test').value;
  let date=document.getElementById('date').value;
  let link=document.getElementById('link').value;

  if(!id){alert('Enter Patient ID');return}

  database[id]={name,test,date,link};
  localStorage.setItem('labData',JSON.stringify(database));

  let message=`Hello ${name} 👋\n\nYour Lab Report is Ready ✅\n\n🧪 Test: ${test}\n📅 Date: ${date}\n\n🔗 Check Your Report Here:\n${SITE}\n\n🆔 Your Patient ID: ${id}\n\n⚠️ Important:\nPlease consult your doctor for proper interpretation.\n\nThank you for trusting\n🌟 Galaxy Pathology Lab\n\nFor any queries:\n📞 ${CONTACT}`;

  document.getElementById('msg').value=message;
}

function copyMsg(){
  let ta=document.getElementById('msg');
  ta.select();
  document.execCommand('copy');
  alert('Copied');
}

function getReport(){
  let id=document.getElementById('patientId').value;
  let data=database[id];
  if(data){
    window.open(data.link,'_blank');
  }else{
    document.getElementById('result').innerText='Report not found';
  }
}
</script></body>
</html>
