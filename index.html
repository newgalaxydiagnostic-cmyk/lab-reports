<script>
let reports = JSON.parse(localStorage.getItem("reports") || "[]");

// View switch
function showView(view) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
}

function showAdminLogin() {
  showView('login');
}

// Login
function doLogin() {
  const pass = document.getElementById("loginPass").value;
  if (pass === "admin123") {
    showView("admin");
    loadStats();
  } else {
    document.getElementById("loginErr").classList.add("show");
  }
}

function doLogout() {
  showView("portal");
}

// Find report
function findReport() {
  const id = document.getElementById("portalId").value.trim();
  const wrap = document.getElementById("resultWrap");

  if (!id) return;

  const report = reports.find(r => r.id === id);

  if (report) {
    wrap.innerHTML = `
      <div class="result-found">
        <div class="rf-head">
          <h3>✅ Report Found</h3>
          <p>${report.name}</p>
        </div>
        <div class="rf-body">
          <div class="rf-row">
            <span class="rf-key">Test</span>
            <span class="rf-val">${report.test}</span>
          </div>
          <div class="rf-row">
            <span class="rf-key">Date</span>
            <span class="rf-val">${report.date}</span>
          </div>
          <a href="${report.link}" target="_blank" class="dl-btn">⬇ Download Report</a>
        </div>
      </div>
    `;
  } else {
    wrap.innerHTML = `
      <div class="result-notfound">
        <span class="nf-icon">❌</span>
        <h3>Report Not Found</h3>
        <p>Please check your ID</p>
      </div>
    `;
  }

  wrap.classList.add("show");
}

// Add report
function addReport() {
  const id = document.getElementById("newId").value.trim();
  const name = document.getElementById("newName").value.trim();
  const test = document.getElementById("newTest").value.trim();
  const date = document.getElementById("newDate").value;
  const link = document.getElementById("newLink").value.trim();

  if (!id || !name || !link) {
    alert("Required fields missing");
    return;
  }

  reports.push({ id, name, test, date, link });
  localStorage.setItem("reports", JSON.stringify(reports));

  alert("Report Added ✅");
  loadStats();
}

// Stats
function loadStats() {
  document.getElementById("sTotal").innerText = reports.length;
}
</script>
